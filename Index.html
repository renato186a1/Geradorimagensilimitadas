<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de 
        Imagens AI Ilimitado</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background-color: var(--panel-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Principal */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            padding: 2rem;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Painel de Controle */
        .controls {
            background-color: var(--panel-color);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            height: fit-content;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        textarea {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 8px;
            resize: vertical;
            min-height: 120px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row > * {
            flex: 1;
        }

        select, input[type="text"], input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.75rem;
            border-radius: 8px;
            width: 100%;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem;
        }

        .btn-secondary:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Área de Visualização */
        .preview-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .image-container {
            background-color: var(--panel-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            min-height: 512px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .image-container img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .image-container img.loaded {
            opacity: 1;
        }

        /* Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--border-color);
            border-bottom-color: var(--accent-color);
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
            position: absolute;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .placeholder-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: none;
        }

        /* Barra de Ação da Imagem */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .action-bar.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Histórico */
        .history-section {
            background-color: var(--panel-color);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            max-height: 300px;
            overflow-y: auto;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .history-item {
            aspect-ratio: 1;
            background-color: var(--bg-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-item:hover {
            border-color: var(--accent-color);
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background-color: var(--panel-color);
            color: var(--text-color);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out forwards;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
            
            .controls {
                order: 2;
            }

            .preview-area {
                order: 1;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>✨ AI Image Gen</h1>
    <div style="font-size: 0.8rem; color: var(--text-secondary);">Powered by Pollinations AI</div>
</header>

<main>
    <!-- Controles Esquerdos -->
    <section class="controls">
        <div class="input-group">
            <label for="prompt">Prompt (Descrição da Imagem)</label>
            <textarea id="prompt" placeholder="Ex: Um gato cyberpunk bebendo café em Tóquio futurista, iluminação neon, alta resolução..."></textarea>
            <button class="btn-secondary" id="surpriseBtn" style="margin-top: 0.5rem;">🎲 Surpreenda-me</button>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="width">Largura</label>
                <input type="number" id="width" value="1024" min="256" max="2048" step="64">
            </div>
            <div class="input-group">
                <label for="height">Altura</label>
                <input type="number" id="height" value="1024" min="256" max="2048" step="64">
            </div>
        </div>

        <div class="input-group">
            <label for="ratio">Rápido (Proporção)</label>
            <select id="ratio">
                <option value="square">Quadrado (1:1)</option>
                <option value="portrait">Retrato (3:4)</option>
                <option value="landscape">Paisagem (4:3)</option>
                <option value="wide">Ultrawide (16:9)</option>
                <option value="custom">Personalizado</option>
            </select>
        </div>

        <div class="input-group">
            <label for="seed">Seed (Semente - Opcional)</label>
            <input type="text" id="seed" placeholder="Deixe em branco para aleatório">
            <small style="color: var(--text-secondary); font-size: 0.75rem;">Use a mesma seed e prompt para recriar a imagem.</small>
        </div>

        <button class="btn-primary" id="generateBtn">
            <span>🚀 Gerar Imagem</span>
        </button>
    </section>

    <!-- Área de Visualização -->
    <section class="preview-area">
        <div class="image-container" id="imageContainer">
            <div class="loader" id="loader"></div>
            <p class="placeholder-text" id="placeholderText">Sua imagem aparecerá aqui</p>
            <img id="resultImage" src="" alt="Imagem gerada por IA">
        </div>

        <div class="action-bar" id="actionBar">
            <button class="btn-secondary" id="downloadBtn">⬇️ Baixar</button>
            <button class="btn-secondary" id="expandBtn">🔍 Abrir em nova aba</button>
        </div>

        <div class="history-section">
            <label>Histórico da Sessão</label>
            <div class="history-grid" id="historyGrid">
                <!-- Itens do histórico aparecerão aqui -->
            </div>
        </div>
    </section>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
    // Elementos do DOM
    const promptInput = document.getElementById('prompt');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const ratioSelect = document.getElementById('ratio');
    const seedInput = document.getElementById('seed');
    const generateBtn = document.getElementById('generateBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    
    const imageContainer = document.getElementById('imageContainer');
    const resultImage = document.getElementById('resultImage');
    const loader = document.getElementById('loader');
    const placeholderText = document.getElementById('placeholderText');
    const actionBar = document.getElementById('actionBar');
    
    const downloadBtn = document.getElementById('downloadBtn');
    const expandBtn = document.getElementById('expandBtn');
    const historyGrid = document.getElementById('historyGrid');

    // Estado
    let currentUrl = '';
    let history = [];

    // Listeners de Proporção
    ratioSelect.addEventListener('change', () => {
        const ratio = ratioSelect.value;
        const base = 1024;
        
        switch(ratio) {
            case 'square':
                widthInput.value = 1024;
                heightInput.value = 1024;
                break;
            case 'portrait':
                widthInput.value = 768;
                heightInput.value = 1024;
                break;
            case 'landscape':
                widthInput.value = 1024;
                heightInput.value = 768;
                break;
            case 'wide':
                widthInput.value = 1280;
                heightInput.value = 720;
                break;
            case 'custom':
                // Não altera valores
                break;
        }
    });

    // Função Gerar
    generateBtn.addEventListener('click', generateImage);
    
    // Gerar ao pressionar Enter (Ctrl+Enter no textarea)
    promptInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            generateImage();
        }
    });

    // Botão Surpresa
    surpriseBtn.addEventListener('click', () => {
        const subjects = ["um astronauta futurista", "um castelo flutuante", "um robô fofo", "um dragão cibernético", "uma paisagem alienígena"];
        const styles = ["estilo cyberpunk", "arte vaporwave", "realista 8k", "pintura a óleo", "anime studio ghibli", "pixel art"];
        
        const randomSubject = subjects[Math.floor(Math.random() * subjects.length)];
        const randomStyle = styles[Math.floor(Math.random() * styles.length)];
        
        promptInput.value = `${randomSubject}, ${randomStyle}, iluminação dramática`;
        showToast("Prompt gerado! Clique em Gerar.");
    });

    async function generateImage() {
        const prompt = promptInput.value.trim();
        
        if (!prompt) {
            showToast("Por favor, digite uma descrição para a imagem.", "error");
            promptInput.focus();
            return;
        }

        // UI Loading State
        startLoading();

        // Parâmetros
        let seed = seedInput.value.trim();
        if (!seed) {
            seed = Math.floor(Math.random() * 1000000);
            seedInput.value = seed; // Mostra a seed gerada para o usuário
        }

        const width = widthInput.value || 1024;
        const height = heightInput.value || 1024;
        
        // Codificar prompt para URL
        const encodedPrompt = encodeURIComponent(prompt);
        
        // Construir URL do Pollinations AI
        // Adicionamos '&nologo=true' para tentar remover marcas d'água se possível
        currentUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&seed=${seed}&nologo=true&model=flux`;

        // Carregar imagem
        resultImage.src = currentUrl;
        
        // Evento de carregamento da imagem
        resultImage.onload = () => {
            stopLoading();
            actionBar.classList.add('active');
            addToHistory(currentUrl, prompt);
            showToast("Imagem gerada com sucesso!");
        };

        resultImage.onerror = () => {
            stopLoading();
            showToast("Erro ao gerar imagem. Tente novamente.", "error");
        };
    }

    // Funções de UI Auxiliares
    function startLoading() {
        resultImage.classList.remove('loaded');
        resultImage.src = ''; 
        loader.style.display = 'block';
        placeholderText.style.display = 'none';
        actionBar.classList.remove('active');
        generateBtn.disabled = true;
        generateBtn.innerHTML = '⏳ Gerando...';
    }

    function stopLoading() {
        loader.style.display = 'none';
        resultImage.classList.add('loaded');
        generateBtn.disabled = false;
        generateBtn.innerHTML = '🚀 Gerar Imagem';
    }

    // Download (Fetch para converter para Blob e forçar download)
    downloadBtn.addEventListener('click', async () => {
        if (!currentUrl) return;
        
        showToast("Preparando download...");
        
        try {
            const response = await fetch(currentUrl);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            // Nome do arquivo baseado na data
            const timestamp = new Date().getTime();
            a.download = `ai-gen-${timestamp}.jpg`;
            
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            showToast("Download iniciado!");
        } catch (err) {
            console.error(err);
            // Fallback caso o fetch falhe (ex: CORS estrito), abre em nova aba
            window.open(currentUrl, '_blank');
            showToast("Abrindo imagem em nova aba (Download direto falhou).");
        }
    });

    expandBtn.addEventListener('click', () => {
        if (currentUrl) window.open(currentUrl, '_blank');
    });

    // Sistema de Histórico
    function addToHistory(url, prompt) {
        // Evitar duplicatas consecutivas
        if (history.length > 0 && history[0].url === url) return;

        const item = { url, prompt, id: Date.now() };
        history.unshift(item);
        
        renderHistory();
    }

    function renderHistory() {
        historyGrid.innerHTML = '';
        
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.title = item.prompt;
            
            const img = document.createElement('img');
            img.src = item.url;
            img.loading = "lazy"; // Lazy loading para performance
            
            div.appendChild(img);
            
            // Clicar no histórico recarrega a imagem
            div.addEventListener('click', () => {
                startLoading();
                resultImage.src = item.url;
                currentUrl = item.url;
                promptInput.value = item.prompt;
                
                // Tentar extrair parâmetros da URL antiga para preencher inputs
                // Nota: Isso é simplificado, pois a URL do pollinations pode ser complexa
                try {
                    const urlObj = new URL(item.url);
                    const seedParam = urlObj.searchParams.get('seed');
                    if (seedParam) seedInput.value = seedParam;
                } catch(e) {}

                resultImage.onload = () => {
                    stopLoading();
                    actionBar.classList.add('active');
                };
            });
            
            historyGrid.appendChild(div);
        });
    }

    // Sistema de Notificações (Toast)
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        
        // Ícone baseado no tipo
        const icon = type === 'error' ? '⚠️' : '✅';
        
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
        
        if (type === 'error') {
            toast.style.borderLeftColor = '#ef4444';
        }
        
        container.appendChild(toast);
        
        // Remover após 3 segundos
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                toast.remove();
            }, 300);
        }, 3000);
    }
</script>

</body>
</html>
